<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WeatherEdge · Kalshi Temperature Markets</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Archivo:wght@400;500;600;700;800;900&family=Archivo+Narrow:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:      #f4f1ec;
  --bg2:     #ffffff;
  --bg3:     #f0ede7;
  --border:  #e0dbd2;
  --border2: #ccc7bc;
  --text:    #1a1714;
  --text2:   #5a5349;
  --text3:   #9a9088;
  --accent:  #1a56db;
  --accent-light: #e8effd;
  --green:   #0d7a3e;
  --green-bg:#e6f5ec;
  --red:     #c81e1e;
  --red-bg:  #fde8e8;
  --amber:   #92400e;
  --amber-bg:#fef3c7;
  --shadow:  0 1px 4px rgba(0,0,0,.07), 0 4px 16px rgba(0,0,0,.05);
  --shadow-sm: 0 1px 3px rgba(0,0,0,.06);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Archivo', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; font-size: 14px; }

/* HEADER */
header {
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  height: 54px;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 200;
  box-shadow: var(--shadow-sm);
}
.logo {
  font-family: 'Archivo', sans-serif;
  font-weight: 900;
  font-size: 18px;
  letter-spacing: -0.03em;
  display: flex; align-items: center; gap: 9px;
}
.logo-mark {
  width: 30px; height: 30px;
  background: var(--accent);
  border-radius: 7px;
  display: flex; align-items: center; justify-content: center;
  font-size: 15px; color: white;
}
.logo-text { color: var(--text); }
.logo-text span { color: var(--accent); }
.status-chip {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px; font-weight: 600;
  padding: 4px 10px; border-radius: 20px;
  display: flex; align-items: center; gap: 5px;
  border: 1px solid;
  letter-spacing: 0.04em;
}
.status-chip.live   { color: var(--green); background: var(--green-bg); border-color: #9fdcb9; }
.status-chip.error  { color: var(--red);   background: var(--red-bg);   border-color: #f5b5b2; }
.status-chip.loading{ color: var(--amber); background: var(--amber-bg); border-color: #fcd34d; }
.s-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; animation: pulse 1.4s ease-in-out infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

/* CITY TABS */
.city-bar {
  background: var(--bg2);
  border-bottom: 2px solid var(--border);
  padding: 0 24px;
  display: flex; gap: 0;
  overflow-x: auto; scrollbar-width: none;
}
.city-bar::-webkit-scrollbar { display: none; }
.city-tab {
  font-family: 'Archivo Narrow', sans-serif;
  font-weight: 700; font-size: 12px;
  letter-spacing: 0.06em; text-transform: uppercase;
  padding: 11px 15px;
  cursor: pointer; color: var(--text3);
  border-bottom: 2px solid transparent;
  margin-bottom: -2px;
  white-space: nowrap; transition: all .15s;
  display: flex; align-items: center; gap: 5px;
}
.city-tab:hover { color: var(--text2); background: var(--bg3); }
.city-tab.active { color: var(--accent); border-bottom-color: var(--accent); background: var(--accent-light); }
.edge-pip { width: 6px; height: 6px; border-radius: 50%; background: var(--green); box-shadow: 0 0 5px rgba(13,122,62,.4); }

/* LAYOUT - full width now, no right panel */
.main { padding: 0; }

/* VIEW TABS */
.view-tabs {
  background: var(--bg2); border-bottom: 2px solid var(--border);
  padding: 0 24px; display: flex; gap: 0;
}
.view-tab {
  font-family: 'Archivo Narrow', sans-serif; font-weight: 700;
  font-size: 12px; letter-spacing: .06em; text-transform: uppercase;
  padding: 11px 18px; cursor: pointer; color: var(--text3);
  border-bottom: 2px solid transparent; margin-bottom: -2px;
  transition: all .15s;
}
.view-tab:hover { color: var(--text2); }
.view-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

/* TODAY PANEL */
.today-panel { max-width: 960px; margin: 0 auto; padding: 22px 24px; }

/* HISTORICS PANEL */
.hist-panel { max-width: 960px; margin: 0 auto; padding: 22px 24px; }
.hist-loading { display:flex; align-items:center; justify-content:center; height:200px; color:var(--text3); font-family:'IBM Plex Mono',monospace; font-size:12px; gap:8px; }

/* MAE TABLE */
.mae-wrap { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; margin-bottom: 22px; }
.mae-table { width: 100%; border-collapse: collapse; }
.mae-table th {
  font-family: 'IBM Plex Mono', monospace; font-size: 9px; font-weight: 700;
  letter-spacing: .12em; text-transform: uppercase; color: var(--text3);
  padding: 10px 14px; background: var(--bg3); border-bottom: 1px solid var(--border);
  text-align: left;
}
.mae-table th.num { text-align: right; }
.mae-table td { padding: 10px 14px; border-bottom: 1px solid var(--border); font-size: 13px; }
.mae-table tr:last-child td { border-bottom: none; }
.mae-table tr:hover td { background: var(--bg3); }
.mae-rank { font-family: 'IBM Plex Mono', monospace; font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 4px; }
.mae-rank.r1 { background: #fef3c7; color: #92400e; }
.mae-rank.r2 { background: var(--bg3); color: var(--text3); }
.mae-val { font-family: 'IBM Plex Mono', monospace; font-size: 12px; font-weight: 600; text-align: right; }
.mae-bar-wrap { display: flex; align-items: center; gap: 8px; }
.mae-bar { height: 6px; border-radius: 3px; min-width: 2px; transition: width .4s ease; }
.mae-best { color: var(--green); font-weight: 700; }
.mae-worst { color: var(--red); }

/* BIAS CHART */
.bias-wrap { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 16px; margin-bottom: 22px; }
.bias-title { font-size: 12px; font-weight: 600; color: var(--text2); margin-bottom: 14px; }
.bias-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.bias-name { font-family: 'IBM Plex Mono', monospace; font-size: 10px; font-weight: 700; width: 44px; flex-shrink: 0; }
.bias-track { flex: 1; position: relative; height: 8px; background: var(--bg3); border-radius: 4px; }
.bias-center { position: absolute; left: 50%; top: -2px; width: 1px; height: 12px; background: var(--border2); }
.bias-fill { position: absolute; top: 0; height: 8px; border-radius: 4px; }
.bias-label { font-family: 'IBM Plex Mono', monospace; font-size: 10px; font-weight: 600; width: 48px; text-align: right; flex-shrink: 0; }

/* DAILY TABLE */
.daily-wrap { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; margin-bottom: 22px; }
.daily-scroll { overflow-x: auto; }
.daily-table { width: 100%; border-collapse: collapse; min-width: 600px; }
.daily-table th {
  font-family: 'IBM Plex Mono', monospace; font-size: 9px; font-weight: 700;
  letter-spacing: .1em; text-transform: uppercase; color: var(--text3);
  padding: 9px 12px; background: var(--bg3); border-bottom: 1px solid var(--border);
  text-align: right; white-space: nowrap;
}
.daily-table th:first-child { text-align: left; }
.daily-table td { padding: 8px 12px; border-bottom: 1px solid var(--border); font-family: 'IBM Plex Mono', monospace; font-size: 11px; text-align: right; }
.daily-table td:first-child { text-align: left; color: var(--text2); }
.daily-table tr:last-child td { border-bottom: none; }
.daily-table tr:hover td { background: var(--bg3); }
.err-pos { color: var(--red); }
.err-neg { color: var(--accent); }
.err-zero { color: var(--green); font-weight: 700; }
.actual-col { font-weight: 700; color: var(--text); }



.section-head {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 9px; font-weight: 600;
  letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--text3); margin-bottom: 12px;
  display: flex; align-items: center; gap: 10px;
}
.section-head::after { content:''; flex:1; height:1px; background: var(--border); }

/* MARKET HEADER */
.mkt-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 18px; }
.mkt-city { font-family: 'Archivo', sans-serif; font-weight: 900; font-size: 26px; letter-spacing: -.03em; line-height: 1.1; }
.mkt-sub  { font-size: 12px; color: var(--text3); margin-top: 3px; }
.mkt-date { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--accent); text-align: right; }

/* BRACKETS */
.brackets { display: flex; flex-direction: column; gap: 5px; margin-bottom: 24px; }
.bracket-row {
  display: grid; grid-template-columns: 140px 1fr 60px 80px;
  align-items: center; gap: 10px;
  padding: 9px 12px; border-radius: 9px;
  border: 1px solid var(--border); background: var(--bg2);
  transition: all .12s;
}
.bracket-row:hover { border-color: var(--border2); box-shadow: var(--shadow-sm); }
.bracket-row.is-peak  { border-color: #93c5fd; background: #eff6ff; }
.bracket-row.is-leader{ border-color: #6ee7b7; background: #f0fdf4; }
.b-label { font-family: 'IBM Plex Mono', monospace; font-size: 12px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.b-track  { height: 6px; background: var(--bg3); border-radius: 3px; overflow: hidden; }
.b-fill   { height: 100%; border-radius: 3px; transition: width .5s ease; }
.b-price  { font-family: 'IBM Plex Mono', monospace; font-size: 13px; font-weight: 600; text-align: right; }
.b-tag    { font-family: 'IBM Plex Mono', monospace; font-size: 9px; font-weight: 700; padding: 2px 7px; border-radius: 4px; text-align: center; letter-spacing:.04em; }
.b-tag.models-here { background: #dbeafe; color: #1d4ed8; }
.b-tag.top-mkt     { background: var(--green-bg); color: var(--green); }
.b-tag.vol         { color: var(--text3); }

/* MODEL CARDS */
.models-row { display: grid; grid-template-columns: repeat(5,1fr); gap: 8px; margin-bottom: 22px; }
.model-card {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 10px; padding: 12px 10px; text-align: center;
  transition: box-shadow .15s;
}
.model-card:hover { box-shadow: var(--shadow-sm); }
.model-card.is-high { border-color: #fca5a5; background: #fff5f5; }
.model-card.is-low  { border-color: #93c5fd; background: #f0f8ff; }
.m-name { font-family: 'Archivo Narrow', sans-serif; font-weight: 700; font-size: 10px; letter-spacing:.1em; text-transform: uppercase; margin-bottom: 6px; }
.m-temp { font-family: 'Archivo', sans-serif; font-weight: 900; font-size: 30px; letter-spacing:-.03em; line-height:1; }
.m-temp.pending { font-size: 18px; color: var(--text3); }
.m-diff { font-size: 10px; font-family: 'IBM Plex Mono', monospace; margin-top: 3px; }

/* CONSENSUS */
.consensus-card {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 10px; padding: 14px 16px; margin-bottom: 22px;
}
.con-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
.con-title { font-size: 12px; font-weight: 600; color: var(--text2); }
.con-spread {
  font-family: 'IBM Plex Mono', monospace; font-size: 10px; font-weight: 600;
  padding: 3px 9px; border-radius: 20px;
}
.con-spread.tight  { background: var(--green-bg); color: var(--green); }
.con-spread.medium { background: var(--amber-bg); color: var(--amber); }
.con-spread.wide   { background: var(--red-bg);   color: var(--red); }
.con-track {
  position: relative; height: 8px;
  background: var(--bg3); border-radius: 4px;
  margin: 20px 0 22px;
}
.con-pin {
  position: absolute; top: 50%;
  transform: translate(-50%, -50%);
  width: 12px; height: 12px;
  border-radius: 50%; border: 2px solid white;
  box-shadow: 0 1px 4px rgba(0,0,0,.2);
  cursor: default;
}
.con-pin-lbl {
  position: absolute; bottom: 14px; left: 50%;
  transform: translateX(-50%);
  font-family: 'IBM Plex Mono', monospace;
  font-size: 8px; font-weight: 600;
  white-space: nowrap;
}
.con-axis { display: flex; justify-content: space-between; font-family: 'IBM Plex Mono', monospace; font-size: 9px; color: var(--text3); margin-top: -18px; }

/* EDGE BOX */
.edge-card {
  border-radius: 12px; padding: 16px; margin-bottom: 6px;
  border: 1px solid var(--border); background: var(--bg2);
}
.edge-card.strong { border-color: #6ee7b7; background: #f0fdf4; box-shadow: 0 0 0 3px rgba(16,185,129,.08); }
.edge-card.mild   { border-color: #fcd34d; background: #fffbeb; }
.edge-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.edge-label { font-family: 'Archivo Narrow', sans-serif; font-weight: 800; font-size: 14px; letter-spacing:.06em; text-transform: uppercase; }
.edge-num { font-family: 'Archivo', sans-serif; font-weight: 900; font-size: 42px; letter-spacing:-.04em; line-height:1; }
.edge-num.hi  { color: var(--green); }
.edge-num.mid { color: var(--amber); }
.edge-num.lo  { color: var(--text3); }
.edge-body { font-size: 13px; line-height: 1.6; color: var(--text2); margin-bottom: 10px; }
.edge-body strong { color: var(--text); }
.edge-chips { display: flex; flex-wrap: wrap; gap: 5px; }
.chip {
  font-family: 'IBM Plex Mono', monospace; font-size: 9px; font-weight: 700;
  padding: 3px 8px; border-radius: 4px; letter-spacing:.03em;
}
.chip.hi  { background: var(--green-bg); color: var(--green); }
.chip.lo  { background: var(--red-bg);   color: var(--red); }
.chip.neu { background: var(--bg3);      color: var(--text3); }

/* ERROR BANNER */
.dots { display:inline-flex; gap:3px; align-items:center; }
.dots span { width:5px; height:5px; border-radius:50%; background:var(--text3); animation: dot 1.2s ease-in-out infinite; }
.dots span:nth-child(2){animation-delay:.2s} .dots span:nth-child(3){animation-delay:.4s}
@keyframes dot{0%,80%,100%{transform:scale(.6);opacity:.4}40%{transform:scale(1);opacity:1}}
.err-banner {
  background: var(--red-bg); border: 1px solid #fca5a5; border-radius: 9px;
  padding: 10px 14px; margin-bottom: 16px; font-size: 12px; color: var(--red);
  display: flex; gap: 8px; line-height: 1.5;
}

.toast { position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:var(--text); color:white; font-family:'IBM Plex Mono',monospace; font-size:11px; padding:8px 16px; border-radius:8px; opacity:0; transition:opacity .2s; pointer-events:none; z-index:999; white-space:nowrap; }
.toast.show { opacity:1; }

/* CHART */
.chart-wrap {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 10px; padding: 14px 16px; margin-bottom: 22px;
}
.chart-header { display:flex; justify-content:space-between; align-items:center; margin-bottom: 12px; }
.chart-title { font-size:12px; font-weight:600; color:var(--text2); }
.chart-legend { display:flex; flex-wrap:wrap; gap:10px; }
.chart-legend-item { display:flex; align-items:center; gap:5px; font-family:'IBM Plex Mono',monospace; font-size:10px; font-weight:600; color:var(--text2); }
.chart-legend-line { width:18px; height:2px; border-radius:1px; }
.chart-legend-line.dashed { background: repeating-linear-gradient(90deg, currentColor 0, currentColor 4px, transparent 4px, transparent 8px); height:0; border-top: 2px dashed; }
canvas.temp-chart { width:100%; height:200px; display:block; }

::-webkit-scrollbar{width:5px;height:5px} ::-webkit-scrollbar-track{background:transparent} ::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

@media(max-width:900px){
  .models-row{grid-template-columns:repeat(3,1fr)}
}
@media(max-width:520px){
  .models-row{grid-template-columns:repeat(2,1fr)}
  header{padding:0 14px} .city-bar{padding:0 10px}
  .today-panel,.hist-panel{padding:14px}
}
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-mark">🌡</div>
    <div class="logo-text">Weather<span>Edge</span></div>
  </div>
  <div class="status-chip loading" id="statusChip">
    <div class="s-dot"></div>
    <span id="statusTxt">Loading...</span>
  </div>
</header>

<div class="city-bar" id="cityBar">
  <!-- injected -->
</div>

<div class="view-tabs">
  <div class="view-tab active" id="tab-today" onclick="switchView('today')">Today's Markets</div>
  <div class="view-tab" id="tab-hist"  onclick="switchView('hist')">Model Accuracy (30d)</div>
</div>

<div class="main">
  <div id="view-today">
    <div class="today-panel" id="leftPanel">
      <div style="display:flex;align-items:center;justify-content:center;height:300px;color:var(--text3);font-family:'IBM Plex Mono',monospace;font-size:12px;gap:8px">
        <div class="dots"><span></span><span></span><span></span></div> Fetching markets...
      </div>
    </div>
  </div>

  <div id="view-hist" style="display:none">
    <div class="hist-panel" id="histPanel">
      <div class="hist-loading">
        <div class="dots"><span></span><span></span><span></span></div> Click to load historical accuracy...
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── CITY CONFIG ─────────────────────────────────────────────────────────────
const CITIES = [
  { series:'KXHIGHNY',    name:'New York',       short:'NYC', lat:40.7789,  lon:-73.9692,  station:'KNYC'  },
  { series:'KXHIGHCHI',   name:'Chicago',        short:'CHI', lat:41.8827,  lon:-87.6233,  station:'KMDW'  },
  { series:'KXHIGHMIA',   name:'Miami',          short:'MIA', lat:25.7617,  lon:-80.1918,  station:'KMIA'  },
  { series:'KXHIGHLAX',   name:'Los Angeles',    short:'LAX', lat:34.0522,  lon:-118.2437, station:'KLAX'  },
  { series:'KXHIGHAUS',   name:'Austin',         short:'AUS', lat:30.2672,  lon:-97.7431,  station:'KAUS'  },
  { series:'KXHIGHTBOS',  name:'Boston',         short:'BOS', lat:42.3601,  lon:-71.0589,  station:'KBOS'  },
  { series:'KXHIGHDEN',   name:'Denver',         short:'DEN', lat:39.7392,  lon:-104.9903, station:'KDEN'  },
  { series:'KXHIGHTHOU',  name:'Houston',        short:'HOU', lat:29.7604,  lon:-95.3698,  station:'KHOU'  },
  { series:'KXHIGHTPHX',  name:'Phoenix',        short:'PHX', lat:33.4484,  lon:-112.0740, station:'KPHX'  },
  { series:'KXHIGHTATL',  name:'Atlanta',        short:'ATL', lat:33.7490,  lon:-84.3880,  station:'KATL'  },
  { series:'KXHIGHPHIL',  name:'Philadelphia',   short:'PHL', lat:39.9526,  lon:-75.1652,  station:'KPHL'  },
  { series:'KXHIGHTDC',   name:'Washington DC',  short:'DC',  lat:38.9072,  lon:-77.0369,  station:'KDCA'  },
  { series:'KXHIGHTDAL',  name:'Dallas',         short:'DAL', lat:32.7767,  lon:-96.7970,  station:'KDFW'  },
  { series:'KXHIGHTSEA',  name:'Seattle',        short:'SEA', lat:47.6062,  lon:-122.3321, station:'KSEA'  },
  { series:'KXHIGHTMIN',  name:'Minneapolis',    short:'MSP', lat:44.9778,  lon:-93.2650,  station:'KMSP'  },
  { series:'KXHIGHTSFO',  name:'San Francisco',  short:'SFO', lat:37.7749,  lon:-122.4194, station:'KSFO'  },
];

const MODELS = [
  { id:'gfs',   name:'GFS',   color:'#1a56db', url:'https://api.open-meteo.com/v1/gfs',      hourly:false },
  { id:'ecmwf', name:'ECMWF', color:'#7c3aed', url:'https://api.open-meteo.com/v1/ecmwf',    hourly:true  },
  { id:'nws',   name:'NWS',   color:'#0d7a3e', url:'nws' }, // uses api.weather.gov
  { id:'gem',   name:'GEM',   color:'#92400e', url:'https://api.open-meteo.com/v1/gem',       hourly:false },
  { id:'icon',  name:'ICON',  color:'#c81e1e', url:'https://api.open-meteo.com/v1/dwd-icon',  hourly:false },
];

// NWS grid URL cache: series → { forecast, forecastHourly }
const nwsGridCache = {};

// ── STATE ─────────────────────────────────────────────────────────────────────
let activeSeries = CITIES[0].series;
let mktCache    = {};
let wxCache     = {};
let hourlyCache = {};
let activeView  = 'today';
let histLoaded  = false;

// ── KALSHI FETCH ─────────────────────────────────────────────────────────────
async function kalshi(path, params = {}) {
  const qs = new URLSearchParams(params).toString();
  // Pass path and extra query params separately
  const url = `/api/proxy?path=${encodeURIComponent(path)}${qs ? '&' + qs : ''}`;
  const r = await fetch(url);
  if (!r.ok) {
    const txt = await r.text();
    throw new Error(`Kalshi ${r.status}: ${txt.slice(0,120)}`);
  }
  return r.json();
}

async function fetchMarkets(city, force = false) {
  if (mktCache[city.series]?.loaded && !force) return;
  try {
    const data = await kalshi('/markets', { series_ticker: city.series, status: 'open', limit: 50 });
    const markets = data.markets || [];
    console.log(`[${city.series}] Got ${markets.length} markets. First:`, markets[0]);
    mktCache[city.series] = { markets, loaded: true };
  } catch(e) {
    console.error(`[${city.series}] Markets error:`, e);
    mktCache[city.series] = { markets: [], loaded: true, error: e.message };
  }
}

// ── NWS FETCH ────────────────────────────────────────────────────────────────
async function getNWSGridUrls(city) {
  if (!nwsGridCache[city.series]) {
    const pts = await fetch(`https://api.weather.gov/points/${city.lat},${city.lon}`, {
      headers: { 'User-Agent': 'WeatherEdge/1.0' }
    });
    if (!pts.ok) throw new Error(`points ${pts.status}`);
    const pd = await pts.json();
    nwsGridCache[city.series] = {
      forecast:       pd.properties?.forecast,
      forecastHourly: pd.properties?.forecastHourly,
    };
  }
  return nwsGridCache[city.series];
}

async function fetchNWS(city) {
  try {
    const { forecast } = await getNWSGridUrls(city);
    if (!forecast) throw new Error('no forecast URL');
    const fc = await fetch(forecast, { headers: { 'User-Agent': 'WeatherEdge/1.0' } });
    if (!fc.ok) throw new Error(`forecast ${fc.status}`);
    const fd = await fc.json();
    const periods = fd.properties?.periods || [];
    const today = new Date().toLocaleDateString('en-CA');
    const daytime = periods.find(p => {
      const pDate = new Date(p.startTime).toLocaleDateString('en-CA');
      return p.isDaytime && pDate === today;
    }) || periods.find(p => p.isDaytime);
    if (!daytime) throw new Error('no daytime period');
    let temp = daytime.temperature;
    if (daytime.temperatureUnit === 'C') temp = Math.round(temp * 9/5 + 32);
    return temp;
  } catch(e) {
    console.warn('NWS daily failed:', e.message);
    return null;
  }
}

// ── HOURLY CHART DATA ────────────────────────────────────────────────────────
async function fetchHourlyData(city) {
  if (hourlyCache[city.series]) return;
  const today = new Date().toLocaleDateString('en-CA');
  const result = { hours: [], modelLines: {}, observed: [] };

  // Build 24 hour labels for today
  result.hours = Array.from({length:24}, (_,i) => i); // 0–23

  // Fetch hourly model data from Open-Meteo in parallel
  const openMeteoModels = MODELS.filter(m => m.url !== 'nws');
  await Promise.all(openMeteoModels.map(async m => {
    try {
      let temps;
      if (m.hourly) {
        // ECMWF - already hourly
        const url = `${m.url}?latitude=${city.lat}&longitude=${city.lon}&hourly=temperature_2m&temperature_unit=fahrenheit&forecast_days=1&timezone=auto`;
        const r = await fetch(url);
        if (!r.ok) throw new Error(`HTTP ${r.status}`);
        const d = await r.json();
        if (d.error) throw new Error(d.reason);
        temps = d.hourly?.temperature_2m?.slice(0, 24) || [];
      } else {
        // Daily models — fetch hourly via temperature_2m
        const url = `${m.url}?latitude=${city.lat}&longitude=${city.lon}&hourly=temperature_2m&temperature_unit=fahrenheit&forecast_days=1&timezone=auto`;
        const r = await fetch(url);
        if (!r.ok) throw new Error(`HTTP ${r.status}`);
        const d = await r.json();
        if (d.error) throw new Error(d.reason);
        temps = d.hourly?.temperature_2m?.slice(0, 24) || [];
      }
      result.modelLines[m.id] = temps;
    } catch(e) {
      console.warn(`Hourly ${m.name} failed:`, e.message);
      result.modelLines[m.id] = [];
    }
  }));

  // NWS hourly forecast
  try {
    const { forecastHourly } = await getNWSGridUrls(city);
    if (forecastHourly) {
      const r = await fetch(forecastHourly, { headers: { 'User-Agent': 'WeatherEdge/1.0' } });
      if (r.ok) {
        const d = await r.json();
        const periods = d.properties?.periods || [];
        // Map to 24-hour array for today
        const nwsHourly = new Array(24).fill(null);
        for (const p of periods) {
          const pDate = new Date(p.startTime).toLocaleDateString('en-CA');
          if (pDate !== today) continue;
          const hour = new Date(p.startTime).getHours();
          if (hour >= 0 && hour < 24) {
            let t = p.temperature;
            if (p.temperatureUnit === 'C') t = t * 9/5 + 32;
            nwsHourly[hour] = Math.round(t);
          }
        }
        result.modelLines['nws'] = nwsHourly;
      }
    }
  } catch(e) {
    console.warn('NWS hourly failed:', e.message);
    result.modelLines['nws'] = [];
  }

  // NWS observed actuals from station
  try {
    const stationUrl = `https://api.weather.gov/stations/${city.station}/observations?start=${today}T00:00:00Z&end=${today}T23:59:59Z&limit=48`;
    const r = await fetch(stationUrl, { headers: { 'User-Agent': 'WeatherEdge/1.0' } });
    if (r.ok) {
      const d = await r.json();
      const obs = new Array(24).fill(null);
      for (const f of (d.features || [])) {
        const t = f.properties?.temperature?.value;
        const ts = f.properties?.timestamp;
        if (t == null || !ts) continue;
        const hour = new Date(ts).getHours();
        // Convert C to F
        const tF = Math.round(t * 9/5 + 32);
        if (hour >= 0 && hour < 24) obs[hour] = tF;
      }
      result.observed = obs;
    }
  } catch(e) {
    console.warn('NWS observations failed:', e.message);
    result.observed = new Array(24).fill(null);
  }

  hourlyCache[city.series] = result;
}

// ── OPEN-METEO (daily max) ────────────────────────────────────────────────────
async function fetchWeather(city) {
  if (wxCache[city.series]) return;
  const results = {};

  await Promise.all(MODELS.map(async m => {
    try {
      if (m.url === 'nws') {
        results[m.id] = await fetchNWS(city);
        return;
      }
      let v;
      if (m.hourly) {
        const url = `${m.url}?latitude=${city.lat}&longitude=${city.lon}&hourly=temperature_2m&temperature_unit=fahrenheit&forecast_days=1&timezone=auto`;
        const r = await fetch(url);
        if (!r.ok) throw new Error(`HTTP ${r.status}`);
        const d = await r.json();
        if (d.error) throw new Error(d.reason);
        const temps = d.hourly?.temperature_2m?.filter(t => t != null) || [];
        v = temps.length ? Math.max(...temps) : null;
      } else {
        const url = `${m.url}?latitude=${city.lat}&longitude=${city.lon}&daily=temperature_2m_max&temperature_unit=fahrenheit&forecast_days=1&timezone=auto`;
        const r = await fetch(url);
        if (!r.ok) throw new Error(`HTTP ${r.status}`);
        const d = await r.json();
        if (d.error) throw new Error(d.reason);
        v = d.daily?.temperature_2m_max?.[0] ?? null;
      }
      results[m.id] = (v != null) ? Math.round(v * 10) / 10 : null;
    } catch(e) {
      console.warn(`${m.name} failed:`, e.message);
      results[m.id] = null;
    }
  }));

  wxCache[city.series] = results;
}

// ── HELPERS ──────────────────────────────────────────────────────────────────
function getBracketPrice(m) {
  // All price fields are dollar strings e.g. "0.0600" = 6¢
  const bid = parseFloat(m.yes_bid_dollars || '0');
  const ask = parseFloat(m.yes_ask_dollars || '0');
  if (bid > 0 && ask > 0) return Math.round((bid + ask) / 2 * 100);
  if (bid > 0) return Math.round(bid * 100);
  const last = parseFloat(m.last_price_dollars || '0');
  if (last > 0) return Math.round(last * 100);
  // derive from NO side: yes = 1 - no_bid
  const noBid = parseFloat(m.no_bid_dollars || '0');
  if (noBid > 0) return Math.round((1 - noBid) * 100);
  return 0;
}

function bracketMatchesTemp(market, tempF) {
  // Best field: floor_strike is the exact temperature threshold integer
  if (market.floor_strike != null) {
    // Check if this is the "above" bracket or a range bracket
    const s = (market.no_sub_title || market.yes_sub_title || market.subtitle || '').toLowerCase();
    const isAbove = /above|or above|at least|≥|>=/.test(s);
    const isBelow = /below|under|at most|≤|<=/.test(s);
    if (isAbove) return tempF >= market.floor_strike;
    if (isBelow) return tempF < market.floor_strike;
    // range bracket: floor_strike is the lower bound, next bracket's floor_strike is upper
    // check if temp rounds to this strike
    return Math.round(tempF) === market.floor_strike || 
           (tempF >= market.floor_strike && tempF < market.floor_strike + 2);
  }
  // Fallback: parse text label
  const s = (market.no_sub_title || market.yes_sub_title || market.subtitle || market.title || '').toLowerCase();
  const range = s.match(/(\d+)\s*[-–]\s*(\d+)/);
  if (range) { const lo=+range[1], hi=+range[2]; return tempF>=lo && tempF<=hi; }
  const ge = s.match(/(?:at least|or above|≥|>=)\s*(\d+)/);
  if (ge) return tempF >= +ge[1];
  const le = s.match(/(?:below|under|≤|<=)\s*(\d+)/);
  if (le) return tempF < +le[1];
  return false;
}

function modelAvg(series) {
  const vals = MODELS.map(m => wxCache[series]?.[m.id]).filter(v => v != null);
  return vals.length ? vals.reduce((a,b)=>a+b,0)/vals.length : null;
}
function modelSpread(series) {
  const vals = MODELS.map(m => wxCache[series]?.[m.id]).filter(v => v != null);
  return vals.length > 1 ? Math.max(...vals) - Math.min(...vals) : null;
}

// ── EDGE SCORE ────────────────────────────────────────────────────────────────
function edgeScore(city) {
  const avg = modelAvg(city.series);
  const spread = modelSpread(city.series);
  const mkts = mktCache[city.series]?.markets;
  if (avg == null || !mkts?.length) return 0;

  const target = mkts.find(m => bracketMatchesTemp(m, avg));
  if (!target) return 5;

  const price = getBracketPrice(target);
  const consensus = Math.max(0, 100 - (spread ?? 10) * 6);
  const mismatch = Math.abs(consensus - price);
  return Math.min(99, Math.round(mismatch * 1.1 + (spread != null && spread < 2 ? 12 : 0)));
}

function renderBracket(m, modelAvgTemp) {
  const price   = getBracketPrice(m);
  const label   = m.no_sub_title || m.yes_sub_title || m.subtitle || m.ticker;
  const width   = Math.max(2, price);
  const isPeak  = modelAvgTemp != null && bracketMatchesTemp(m, modelAvgTemp);
  const isTop   = price >= 40;
  const barClr  = price > 50 ? '#1a56db' : price > 25 ? '#6b7280' : '#d1d5db';
  const priceClr= price > 50 ? 'var(--accent)' : price > 25 ? 'var(--text)' : 'var(--text3)';

  let tag = '';
  if (isPeak)  tag = `<span class="b-tag models-here">◀ MODELS</span>`;
  else if (isTop) tag = `<span class="b-tag top-mkt">LEADER</span>`;
  else         tag = `<span class="b-tag vol">${(parseFloat(m.volume_fp)||0).toFixed(0)} vol</span>`;

  return `<div class="bracket-row${isPeak?' is-peak':''}${isTop&&!isPeak?' is-leader':''}">
    <div class="b-label" title="${label}">${label}</div>
    <div class="b-track"><div class="b-fill" style="width:${width}%;background:${barClr}"></div></div>
    <div class="b-price" style="color:${priceClr}">${price}¢</div>
    ${tag}
  </div>`;
}

function renderModelCard(model, wx, avg) {
  const v = wx?.[model.id];
  const diff = (v != null && avg != null) ? v - avg : null;
  const isHigh = diff != null && diff > 1.5;
  const isLow  = diff != null && diff < -1.5;
  const diffStr = diff != null ? (diff > 0 ? `+${diff.toFixed(1)}°` : `${diff.toFixed(1)}°`) : '';
  const diffClr = isHigh ? 'var(--red)' : isLow ? 'var(--accent)' : 'var(--text3)';

  return `<div class="model-card${isHigh?' is-high':isLow?' is-low':''}">
    <div class="m-name" style="color:${model.color}">${model.name}</div>
    ${v != null
      ? `<div class="m-temp">${Math.round(v)}°</div><div class="m-diff" style="color:${diffClr}">${diff != null ? diffStr : '—'}</div>`
      : `<div class="m-temp pending">—</div><div class="m-diff" style="color:var(--text3)">loading</div>`}
  </div>`;
}

function renderConsensus(wx, markets) {
  const pins = MODELS.map(m => ({ ...m, v: wx?.[m.id] })).filter(p => p.v != null);
  if (pins.length < 2) return '';
  const vals = pins.map(p => p.v);
  const lo = Math.min(...vals) - 2, hi = Math.max(...vals) + 2;
  const spread = Math.max(...vals) - Math.min(...vals);
  const spreadCls = spread < 2 ? 'tight' : spread < 5 ? 'medium' : 'wide';
  const spreadLbl = spread < 2 ? `${spread.toFixed(1)}° — Strong consensus` : spread < 5 ? `${spread.toFixed(1)}° — Moderate spread` : `${spread.toFixed(1)}° — Wide disagreement`;

  const pinHTML = pins.map(p => {
    const pct = ((p.v - lo) / (hi - lo)) * 100;
    return `<div class="con-pin" style="left:${pct}%;background:${p.color}" title="${p.name}: ${p.v}°F">
      <span class="con-pin-lbl" style="color:${p.color}">${p.name}</span>
    </div>`;
  }).join('');

  return `
    <div class="section-head">Model Consensus</div>
    <div class="consensus-card">
      <div class="con-header">
        <span class="con-title">Where each model puts the high today</span>
        <span class="con-spread ${spreadCls}">${spreadLbl}</span>
      </div>
      <div class="con-track">${pinHTML}</div>
      <div class="con-axis"><span>${Math.round(lo+2)}°F</span><span>${Math.round((lo+hi)/2)}°F</span><span>${Math.round(hi-2)}°F</span></div>
    </div>`;
}

function renderEdge(city, markets, wx, score) {
  const avg = modelAvg(city.series);
  const spread = modelSpread(city.series);
  if (avg == null) return `<div class="edge-card"><div class="edge-body">Loading model data...</div></div>`;

  const target = markets.find(m => bracketMatchesTemp(m, avg));
  const price  = target ? getBracketPrice(target) : null;
  const cls    = score > 55 ? 'strong' : score > 30 ? 'mild' : '';
  const numCls = score > 55 ? 'hi' : score > 30 ? 'mid' : 'lo';
  const agreeCount = MODELS.filter(m => {
    const v = wx?.[m.id];
    return v != null && avg != null && Math.abs(v - avg) < 2;
  }).length;

  let body = '';
  if (target && price != null) {
    if (score > 55 && price < 40) {
      body = `Models average <strong>${Math.round(avg)}°F</strong> — pointing to <strong>${target.no_sub_title||target.yes_sub_title||target.ticker}</strong>, currently priced at just <strong>${price}¢</strong>. Models suggest this is underpriced. Consider <strong style="color:var(--green)">YES</strong>.`;
    } else if (score > 55 && price > 60) {
      body = `Models average <strong>${Math.round(avg)}°F</strong> but this bracket is priced at <strong>${price}¢</strong>. Possible overpricing. Consider <strong style="color:var(--red)">NO</strong> on <strong>${target.no_sub_title||target.yes_sub_title||target.ticker}</strong>.`;
    } else if (score > 30) {
      body = `Mild signal. Models cluster around <strong>${Math.round(avg)}°F</strong> (${spread?.toFixed(1)}° spread). Target bracket <strong>${target.no_sub_title||target.yes_sub_title||target.ticker}</strong> at <strong>${price}¢</strong> — close to fair but worth monitoring.`;
    } else {
      body = `Models agree on ~<strong>${Math.round(avg)}°F</strong>. Market appears fairly priced at <strong>${price}¢</strong>. No strong edge detected right now.`;
    }
  } else {
    body = `Models average <strong>${Math.round(avg)}°F</strong> but couldn't match to a specific bracket. Check bracket labels manually.`;
  }

  const chips = MODELS.map(m => {
    const v = wx?.[m.id];
    if (v == null) return `<span class="chip neu">${m.name} —</span>`;
    const d = v - avg;
    const cls2 = d > 1.5 ? 'lo' : d < -1.5 ? 'hi' : 'neu';
    return `<span class="chip ${cls2}">${m.name} ${Math.round(v)}°</span>`;
  }).join('');

  return `<div class="edge-card ${cls}">
    <div class="edge-top">
      <div>
        <div class="edge-label">Edge Score</div>
        <div style="font-size:11px;color:var(--text3);font-family:'IBM Plex Mono',monospace;margin-top:2px">${agreeCount}/${MODELS.length} models within 2° · ${spread?.toFixed(1) ?? '?'}° spread</div>
      </div>
      <div class="edge-num ${numCls}">${score}</div>
    </div>
    <div class="edge-body">${body}</div>
    <div class="edge-chips">${chips}</div>
  </div>`;
}

// ── CHART ──────────────────────────────────────────────────────────────────
function drawChart(series) {
  const canvas = document.getElementById('tempChart');
  const legendEl = document.getElementById('chartLegend');
  if (!canvas) return;

  const hd = hourlyCache[series];
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;
  const W = canvas.offsetWidth, H = 200;
  canvas.width  = W * dpr;
  canvas.height = H * dpr;
  ctx.scale(dpr, dpr);

  // Collect all valid values for y-range
  const allVals = [];
  MODELS.forEach(m => {
    const line = hd?.modelLines?.[m.id] || [];
    line.forEach(v => { if (v != null) allVals.push(v); });
  });
  (hd?.observed || []).forEach(v => { if (v != null) allVals.push(v); });

  if (allVals.length === 0) {
    ctx.fillStyle = '#9a9088';
    ctx.font = '12px IBM Plex Mono, monospace';
    ctx.textAlign = 'center';
    ctx.fillText('Loading chart data...', W/2, H/2);
    return;
  }

  const minV = Math.floor(Math.min(...allVals) - 3);
  const maxV = Math.ceil(Math.max(...allVals) + 3);

  const PAD = { top:16, right:16, bottom:28, left:38 };
  const cW = W - PAD.left - PAD.right;
  const cH = H - PAD.top  - PAD.bottom;

  const xPos = i  => PAD.left + (i / 23) * cW;
  const yPos = v  => PAD.top  + (1 - (v - minV) / (maxV - minV)) * cH;

  // Grid lines
  ctx.strokeStyle = '#e0dbd2';
  ctx.lineWidth = 1;
  const ticks = 4;
  for (let i = 0; i <= ticks; i++) {
    const v = minV + (i / ticks) * (maxV - minV);
    const y = yPos(v);
    ctx.beginPath(); ctx.moveTo(PAD.left, y); ctx.lineTo(W - PAD.right, y);
    ctx.stroke();
    ctx.fillStyle = '#9a9088';
    ctx.font = `${10 * dpr / dpr}px IBM Plex Mono, monospace`;
    ctx.textAlign = 'right';
    ctx.fillText(Math.round(v) + '°', PAD.left - 4, y + 3.5);
  }

  // X axis hour labels
  ctx.fillStyle = '#9a9088';
  ctx.textAlign = 'center';
  ctx.font = '9px IBM Plex Mono, monospace';
  [0, 6, 12, 18, 23].forEach(h => {
    const lbl = h === 0 ? '12a' : h < 12 ? `${h}a` : h === 12 ? '12p' : `${h-12}p`;
    ctx.fillText(lbl, xPos(h), H - PAD.bottom + 14);
  });

  // Current time line
  const now = new Date();
  const nowH = now.getHours() + now.getMinutes() / 60;
  if (nowH >= 0 && nowH <= 23) {
    const nx = PAD.left + (nowH / 23) * cW;
    ctx.strokeStyle = '#d1d5db';
    ctx.lineWidth = 1;
    ctx.setLineDash([3, 3]);
    ctx.beginPath(); ctx.moveTo(nx, PAD.top); ctx.lineTo(nx, H - PAD.bottom);
    ctx.stroke();
    ctx.setLineDash([]);
  }

  // Draw model lines
  MODELS.forEach(m => {
    const line = hd?.modelLines?.[m.id] || [];
    const pts = line.map((v, i) => v != null ? { x: xPos(i), y: yPos(v) } : null).filter(Boolean);
    if (pts.length < 2) return;
    ctx.strokeStyle = m.color;
    ctx.lineWidth = m.id === 'nws' ? 2.5 : 1.5;
    ctx.setLineDash([]);
    ctx.beginPath();
    pts.forEach((p, i) => i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y));
    ctx.stroke();
  });

  // Draw observed actuals as dashed black line with dots
  const obs = hd?.observed || [];
  const obsPts = obs.map((v, i) => v != null ? { x: xPos(i), y: yPos(v), v } : null).filter(Boolean);
  if (obsPts.length >= 1) {
    ctx.strokeStyle = '#1a1714';
    ctx.lineWidth = 2;
    ctx.setLineDash([5, 3]);
    ctx.beginPath();
    obsPts.forEach((p, i) => i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y));
    ctx.stroke();
    ctx.setLineDash([]);
    // Dots at each observed point
    obsPts.forEach(p => {
      ctx.fillStyle = '#1a1714';
      ctx.beginPath(); ctx.arc(p.x, p.y, 2.5, 0, Math.PI * 2); ctx.fill();
    });
  }

  // Legend
  if (legendEl) {
    const legendItems = [
      ...MODELS.map(m => `<div class="chart-legend-item"><div class="chart-legend-line" style="background:${m.color};width:18px;height:${m.id==='nws'?3:2}px;border-radius:1px"></div>${m.name}</div>`),
      obsPts.length > 0 ? `<div class="chart-legend-item"><div style="width:18px;border-top:2px dashed #1a1714"></div>Actual</div>` : ''
    ];
    legendEl.innerHTML = legendItems.join('');
  }
}

// ── CITY SELECT ────────────────────────────────────────────────────────────────
async function selectCity(series) {
  activeSeries = series;
  renderTabs();
  renderLeft();
  const city = CITIES.find(c => c.series === series);
  const fetches = [];
  if (!mktCache[series]?.loaded)  fetches.push(fetchMarkets(city));
  if (!wxCache[series])           fetches.push(fetchWeather(city));
  if (!hourlyCache[series])       fetches.push(fetchHourlyData(city));
  await Promise.all(fetches);
  renderLeft();
  renderTabs();
  drawChart(series);
  // If historics tab is open, reload for new city
  if (activeView === 'hist') {
    histLoaded = false;
    histLoaded = true;
    loadHistorics();
  }
}

// ── VIEW SWITCHING ────────────────────────────────────────────────────────────
function switchView(view) {
  activeView = view;
  document.getElementById('view-today').style.display = view === 'today' ? '' : 'none';
  document.getElementById('view-hist').style.display  = view === 'hist'  ? '' : 'none';
  document.getElementById('tab-today').classList.toggle('active', view === 'today');
  document.getElementById('tab-hist').classList.toggle('active',  view === 'hist');
  if (view === 'hist' && !histLoaded) {
    histLoaded = true;
    loadHistorics();
  }
}

// ── HISTORICS ─────────────────────────────────────────────────────────────────
// Uses Open-Meteo Previous Runs API (historical-forecast-api.open-meteo.com)
// which archives actual past model runs — so each day's value IS what the
// model predicted on that day (day-0 run), not a reanalysis.
// Compared against NWS station observed daily highs.

const HIST_DAYS = 30;
let histCache = {}; // series → { dates[], observed[], modelData:{gfs:[], ...}, computed:bool }

async function fetchHistoricForCity(city) {
  if (histCache[city.series]?.computed) return;

  const end   = new Date(); end.setDate(end.getDate() - 1); // yesterday (today not settled yet)
  const start = new Date(end); start.setDate(start.getDate() - (HIST_DAYS - 1));
  const fmt   = d => d.toISOString().split('T')[0];
  const startStr = fmt(start), endStr = fmt(end);

  const result = { dates: [], observed: [], modelData: {}, computed: false };

  // Build date array
  for (let d = new Date(start); d <= end; d.setDate(d.getDate()+1)) {
    result.dates.push(fmt(new Date(d)));
  }

  // Fetch NWS observed daily highs from station observations
  try {
    const r = await fetch(
      `https://api.weather.gov/stations/${city.station}/observations?start=${startStr}T00:00:00Z&end=${endStr}T23:59:59Z&limit=500`,
      { headers: { 'User-Agent': 'WeatherEdge/1.0' } }
    );
    if (r.ok) {
      const d = await r.json();
      // Group by date, find daily max
      const byDate = {};
      for (const f of (d.features || [])) {
        const t = f.properties?.temperature?.value;
        const ts = f.properties?.timestamp;
        if (t == null || !ts) continue;
        const date = ts.split('T')[0];
        const tF = Math.round(t * 9/5 + 32);
        if (!byDate[date] || tF > byDate[date]) byDate[date] = tF;
      }
      result.observed = result.dates.map(d => byDate[d] ?? null);
    }
  } catch(e) { console.warn('Hist NWS obs failed:', e.message); }

  // Fetch historical model data from Previous Runs API
  // Each model at day_offset=0 = what the model predicted on that exact day
  const histModels = [
    { id:'gfs',   name:'GFS',   url:`https://historical-forecast-api.open-meteo.com/v1/forecast?models=gfs_global`   },
    { id:'ecmwf', name:'ECMWF', url:`https://historical-forecast-api.open-meteo.com/v1/forecast?models=ecmwf_ifs025` },
    { id:'nws',   name:'NWS',   url:`https://historical-forecast-api.open-meteo.com/v1/forecast?models=gfs_global`   }, // NWS uses GFS as proxy for hist
    { id:'gem',   name:'GEM',   url:`https://historical-forecast-api.open-meteo.com/v1/forecast?models=gem_global`   },
    { id:'icon',  name:'ICON',  url:`https://historical-forecast-api.open-meteo.com/v1/forecast?models=icon_global`  },
  ];

  await Promise.all(histModels.map(async m => {
    try {
      const url = `${m.url}&latitude=${city.lat}&longitude=${city.lon}&daily=temperature_2m_max&temperature_unit=fahrenheit&start_date=${startStr}&end_date=${endStr}&timezone=auto`;
      const r = await fetch(url);
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      const d = await r.json();
      if (d.error) throw new Error(d.reason);
      const times = d.daily?.time || [];
      const vals  = d.daily?.temperature_2m_max || [];
      // Map to our date array
      result.modelData[m.id] = result.dates.map(date => {
        const i = times.indexOf(date);
        return i >= 0 && vals[i] != null ? Math.round(vals[i] * 10) / 10 : null;
      });
    } catch(e) {
      console.warn(`Hist ${m.name} failed:`, e.message);
      result.modelData[m.id] = result.dates.map(() => null);
    }
  }));

  result.computed = true;
  histCache[city.series] = result;
}

function computeMAE(predicted, actual) {
  const pairs = predicted.map((p, i) => ({ p, a: actual[i] }))
    .filter(x => x.p != null && x.a != null);
  if (!pairs.length) return null;
  const mae = pairs.reduce((sum, x) => sum + Math.abs(x.p - x.a), 0) / pairs.length;
  const bias = pairs.reduce((sum, x) => sum + (x.p - x.a), 0) / pairs.length;
  return { mae: Math.round(mae * 10) / 10, bias: Math.round(bias * 10) / 10, n: pairs.length };
}

async function loadHistorics() {
  const panel = document.getElementById('histPanel');
  const city  = CITIES.find(c => c.series === activeSeries);

  panel.innerHTML = `<div class="hist-loading"><div class="dots"><span></span><span></span><span></span></div> Loading ${HIST_DAYS} days of data for ${city.name}...</div>`;

  await fetchHistoricForCity(city);
  renderHistorics(city);
}

function renderHistorics(city) {
  const panel = document.getElementById('histPanel');
  const hd = histCache[city.series];
  if (!hd?.computed) {
    panel.innerHTML = `<div class="hist-loading">No historical data available.</div>`;
    return;
  }

  const MODEL_META = [
    { id:'gfs',   name:'GFS',   color:'#1a56db' },
    { id:'ecmwf', name:'ECMWF', color:'#7c3aed' },
    { id:'nws',   name:'NWS',   color:'#0d7a3e' },
    { id:'gem',   name:'GEM',   color:'#92400e' },
    { id:'icon',  name:'ICON',  color:'#c81e1e' },
  ];

  // Compute MAE + bias per model
  const stats = MODEL_META.map(m => ({
    ...m,
    ...computeMAE(hd.modelData[m.id] || [], hd.observed),
  })).filter(s => s.mae != null);

  stats.sort((a, b) => a.mae - b.mae);
  const maxMAE = Math.max(...stats.map(s => s.mae));
  const maxBias = Math.max(...stats.map(s => Math.abs(s.bias || 0)));

  // MAE summary table
  const maeRows = stats.map((s, i) => {
    const rankCls = i === 0 ? 'r1' : 'r2';
    const rankLbl = i === 0 ? '🥇 BEST' : `#${i+1}`;
    const barW = Math.round((s.mae / maxMAE) * 120);
    const maeCls = i === 0 ? 'mae-best' : i === stats.length-1 ? 'mae-worst' : '';
    return `<tr>
      <td><span class="mae-rank ${rankCls}">${rankLbl}</span></td>
      <td style="font-weight:700;color:${s.color}">${s.name}</td>
      <td><div class="mae-bar-wrap">
        <div class="mae-bar" style="width:${barW}px;background:${s.color};opacity:.7"></div>
        <span class="mae-val ${maeCls}">${s.mae}°</span>
      </div></td>
      <td class="mae-val" style="color:${s.bias > 0 ? 'var(--red)' : s.bias < 0 ? 'var(--accent)' : 'var(--green)'}">${s.bias > 0 ? '+' : ''}${s.bias}°</td>
      <td class="mae-val" style="color:var(--text3)">${s.n}d</td>
    </tr>`;
  }).join('');

  // Bias visualization
  const biasRows = stats.map(s => {
    const pct = maxBias > 0 ? Math.abs(s.bias) / maxBias * 45 : 0;
    const isPos = s.bias >= 0;
    const fillStyle = isPos
      ? `left:50%;width:${pct}%;background:${s.color};opacity:.7`
      : `left:${50-pct}%;width:${pct}%;background:${s.color};opacity:.7`;
    const biasLbl = s.bias > 0 ? `Runs +${s.bias}° warm` : s.bias < 0 ? `Runs ${s.bias}° cold` : 'No bias';
    return `<div class="bias-row">
      <div class="bias-name" style="color:${s.color}">${s.name}</div>
      <div class="bias-track">
        <div class="bias-center"></div>
        <div class="bias-fill" style="${fillStyle}"></div>
      </div>
      <div class="bias-label" style="color:${s.color}">${biasLbl}</div>
    </div>`;
  }).join('');

  // Daily detail table — last 14 days
  const recentDates = hd.dates.slice(-14);
  const recentObs   = hd.observed.slice(-14);
  const dateHdrs = recentDates.map(d => {
    const dt = new Date(d + 'T12:00:00');
    return `<th>${dt.toLocaleDateString('en-US',{month:'short',day:'numeric'})}</th>`;
  }).join('');

  const modelRows = MODEL_META.map(m => {
    const recent = (hd.modelData[m.id] || []).slice(-14);
    const cells = recent.map((v, i) => {
      const obs = recentObs[i];
      if (v == null) return `<td style="color:var(--text3)">—</td>`;
      const err = obs != null ? v - obs : null;
      const errCls = err == null ? '' : Math.abs(err) < 1 ? 'err-zero' : err > 0 ? 'err-pos' : 'err-neg';
      const errStr = err != null ? ` <span class="${errCls}" style="font-size:9px">(${err>0?'+':''}${Math.round(err)})</span>` : '';
      return `<td>${Math.round(v)}°${errStr}</td>`;
    }).join('');
    return `<tr><td style="color:${m.color};font-weight:700">${m.name}</td>${cells}</tr>`;
  }).join('');

  const obsRow = recentObs.map(v =>
    v != null ? `<td class="actual-col">${v}°</td>` : `<td style="color:var(--text3)">—</td>`
  ).join('');

  panel.innerHTML = `
    <div class="mkt-top">
      <div>
        <div class="mkt-city">Model Accuracy · ${city.name}</div>
        <div class="mkt-sub">Past ${HIST_DAYS} days · forecast vs NWS observed daily high · errors in (parentheses)</div>
      </div>
      <div class="mkt-date">${new Date().toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'})}</div>
    </div>

    <div class="section-head">Mean Absolute Error — Lower is better</div>
    <div class="mae-wrap">
      <table class="mae-table">
        <thead><tr>
          <th>Rank</th><th>Model</th>
          <th>MAE (avg miss)</th>
          <th class="num">Bias</th>
          <th class="num">Days</th>
        </tr></thead>
        <tbody>${maeRows}</tbody>
      </table>
    </div>

    <div class="section-head">Warm/Cold Bias — Does each model run systematically warm or cold?</div>
    <div class="bias-wrap">
      <div class="bias-title">
        Positive = model runs warmer than actual &nbsp;·&nbsp; Negative = model runs colder than actual
      </div>
      ${biasRows}
    </div>

    <div class="section-head">Daily Detail — Last 14 days (error vs actual in parentheses)</div>
    <div class="daily-wrap"><div class="daily-scroll">
      <table class="daily-table">
        <thead><tr><th>Model</th>${dateHdrs}</tr></thead>
        <tbody>
          ${modelRows}
          <tr style="background:var(--bg3)"><td style="font-weight:700">Actual</td>${obsRow}</tr>
        </tbody>
      </table>
    </div></div>
  `;
}

// ── STATUS ────────────────────────────────────────────────────────────────────
function setStatus(state, msg) {
  const chip = document.getElementById('statusChip');
  const txt  = document.getElementById('statusTxt');
  chip.className = `status-chip ${state}`;
  txt.textContent = msg;
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2500);
}

// ── INIT ──────────────────────────────────────────────────────────────────────
async function init() {
  setStatus('loading', 'Loading...');
  renderTabs();

  const first = CITIES[0];
  await Promise.all([fetchMarkets(first), fetchWeather(first), fetchHourlyData(first)]);
  renderLeft();
  renderTabs();
  drawChart(first.series);
  setStatus('live', 'Live · Kalshi + Open-Meteo + NWS');

  // Refresh active city prices every 30s
  setInterval(async () => {
    const city = CITIES.find(c => c.series === activeSeries);
    if (city) {
      await fetchMarkets(city, true);
      renderLeft();
      drawChart(activeSeries);
      setStatus('live', `Live · ${new Date().toLocaleTimeString()}`);
    }
  }, 30000);
}

init();
</script>
